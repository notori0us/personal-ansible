---
# Personal workstations. Run with `--limit <hostname>` to target one.
# Both hosts share the workstations group; OS-specific behavior is gated
# on `ansible_facts['os_family']` inside roles.

workstations:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"
    sagitta:
      ansible_host: sagitta.local
      ansible_user: chris
      ansible_python_interpreter: /usr/bin/python3

---
# Drops ~/.ssh/config and the ansible SSH keypair from 1Password.
# Requires `op` CLI on PATH and an active session on the control node.
#
# Item names are configurable via roles/ssh_config/defaults/main.yml.
# Defaults expect:
#   - "{{ ssh_config_op_config_item }}" (Secure Note) — body is full ssh_config
#   - "{{ ssh_config_op_key_item }}"    (SSH Key)     — fields: "private key", "public key"

- name: Ensure ~/.ssh exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: '0700'

# ----- ~/.ssh/config -----

- name: Read ssh config from 1Password
  ansible.builtin.command: >
    op item get {{ ssh_config_op_config_item }}
    --vault {{ ssh_config_op_vault }}
    --field notesPlain
    --reveal
  register: ssh_config_content
  delegate_to: localhost
  changed_when: false
  no_log: true

- name: Drop ~/.ssh/config
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.ssh/config"
    content: "{{ ssh_config_content.stdout }}\n"
    mode: '0600'
    backup: true
  no_log: true

# ----- ansible SSH keypair -----

- name: Read SSH private key from 1Password
  ansible.builtin.command: >
    op item get {{ ssh_config_op_key_item }}
    --vault {{ ssh_config_op_vault }}
    --field "private key"
    --reveal
  register: ssh_config_priv
  delegate_to: localhost
  changed_when: false
  no_log: true

- name: Drop SSH private key into ~/.ssh
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.ssh/{{ ssh_config_op_key_filename }}"
    content: "{{ ssh_config_priv.stdout }}\n"
    mode: '0600'
  no_log: true

- name: Read SSH public key from 1Password
  ansible.builtin.command: >
    op item get {{ ssh_config_op_key_item }}
    --vault {{ ssh_config_op_vault }}
    --field "public key"
    --reveal
  register: ssh_config_pub
  delegate_to: localhost
  changed_when: false
  no_log: true

- name: Drop SSH public key into ~/.ssh
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.ssh/{{ ssh_config_op_key_filename }}.pub"
    content: "{{ ssh_config_pub.stdout }}\n"
    mode: '0644'
  no_log: true

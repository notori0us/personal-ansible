---
# Phase 2 — distribute secrets from 1Password. Requires `op` on PATH and
# an active session (run `op signin` first).

- name: Personal workstation setup (phase 2 — secrets via 1Password)
  hosts: workstations
  gather_facts: true

  pre_tasks:
    - name: Verify 1Password CLI is available + signed in
      ansible.builtin.command: op whoami
      register: op_check
      changed_when: false
      failed_when: op_check.rc != 0
      delegate_to: localhost

  roles:
    - role: ssh_config
    - role: wireguard_client
